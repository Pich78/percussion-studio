<!-- file: src/components/InstrumentRow/InstrumentRowModel.integration.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integration: InstrumentRowModel</title>
    <link rel="stylesheet" href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css"/>
    <style>
        pre { background-color: #f0f0f0; padding: 1rem; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-light-gray pa4">
    <h1 class="f2 b mb3 bb pb2">Integration Harness: InstrumentRowModel</h1>
    <div class="flex">
        <div class="w-50 pr3">
            <h3 class="f4 b mt0">1. Controls</h3>
            <div class="mb3">
                <label class="f6 b db mb2">Mode</label>
                <select id="mode-select" class="w-100">
                    <option value="playback" selected>Playback</option>
                    <option value="editor">Editor</option>
                </select>
            </div>
            <div class="mb3">
                <label class="f6 b db mb2">Notation String</label>
                <input id="notation-input" type="text" value="o---x---" class="w-100 code">
            </div>
            <button id="create-btn" class="pv2 ph3 bn br2 bg-blue white pointer hover-bg-dark-blue">Create/Reset Model</button>
            <hr class="mv4">
            
            <h3 class="f4 b mt0">2. Actions</h3>
            <p class="f6 gray mt0 mb3">Call methods on the current model instance. Actions will show/hide based on the selected mode.</p>

            <!-- Playback-specific actions -->
            <div id="playback-actions">
                <div class="mb3">
                    <button id="toggle-mute-btn" class="pv2 ph3 bn br2 bg-green white pointer hover-bg-dark-green">Toggle Mute</button>
                </div>
                <div>
                    <label class="f6 b db mb2">Set Volume</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-100">
                </div>
            </div>

            <!-- Editor-specific actions -->
            <div id="editor-actions" class="hidden">
                 <button id="update-cell-btn" class="pv2 ph3 bn br2 bg-orange white pointer hover-bg-dark-orange">Update Cell [0]</button>
            </div>

        </div>
        <div class="w-50 pl3">
            <h3 class="f4 b mt0">3. View Model Output (Getters)</h3>
            <pre><code id="view-model-output"></code></pre>
        </div>
    </div>
    <script type="module" src="./InstrumentRowModel.integration.js"></script>
</body>
</html>
