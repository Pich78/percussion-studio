<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Component Test Harness: flow-panel</title>
    <link rel="stylesheet" href="https://unpkg.com/tachyons@4.12.0/css/tachyons.min.css"/>
    <style>
        body {
            background-color: #f5f5f5;
        }
        .container {
            max-width: 960px;
            margin: auto;
        }
        /* Style for the items being slotted into the flow-panel */
        .flow-item {
            background-color: #fff;
            padding: 16px;
            border-radius: 12px; /* M3 Large Radius */
            border: 1px solid #e0e0e0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-family: 'Roboto', sans-serif;
            cursor: grab;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .flow-item:active {
            cursor: grabbing;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="pa4">
    <div class="container">
        <h1 class="f2 b mb3 bb pb2">Web Component: &lt;flow-panel&gt;</h1>
        <div class="flex">
            <!-- Left: Component View -->
            <div class="w-50 pr3">
                <h2 class="f4 b mb2">Live Component</h2>
                <div class="bg-white shadow-2" style="height: 60vh;">
                    <flow-panel id="flow-panel-component"></flow-panel>
                </div>
            </div>
            <!-- Right: State and Log -->
            <div class="w-50 pl3">
                 <h2 class="f4 b mb2">Application State (Item Order)</h2>
                 <div id="current-state-display" class="f6 code pa2 bg-washed-yellow h-100"></div>
            </div>
        </div>
    </div>

    <!-- Import the component's script -->
    <script type="module" src="./flow-panel.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const flowPanel = document.getElementById('flow-panel-component');
            const stateDisplay = document.getElementById('current-state-display');
            
            // 1. Initial application state
            let items = [
                { id: 1, text: 'Pattern Alpha' },
                { id: 2, text: 'Pattern Bravo' },
                { id: 3, text: 'Pattern Charlie' },
                { id: 4, text: 'Pattern Delta' },
                { id: 5, text: 'Pattern Echo' },
                { id: 6, text: 'Pattern Foxtrot' },
                { id: 7, text: 'Pattern Golf' },
                { id: 8, text: 'Pattern Hotel' },
            ];

            // 2. Render function: Populates the <flow-panel> with children
            function render() {
                // Clear existing children
                flowPanel.innerHTML = '';
                
                // Create and append a child element for each item in our state
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'flow-item';
                    div.textContent = `${item.text} (ID: ${item.id})`;
                    div.draggable = true; // Make the element draggable
                    flowPanel.appendChild(div);
                });
                
                // Update the state display
                const orderedItems = items.map(i => i.text).join('\n');
                stateDisplay.textContent = `Current Order:\n${orderedItems}`;
            }
            
            // 3. Event Listener: Listens for the component's custom event
            flowPanel.addEventListener('flow-reorder', (event) => {
                console.log('Received flow-reorder event:', event.detail);
                
                const { from, to } = event.detail;
                
                // Update the application state array based on the event
                const [movedItem] = items.splice(from, 1);
                items.splice(to, 0, movedItem);
                
                // Re-render to reflect the new state
                render();
            });
            
            // 4. Initial Render
            render();
        });
    </script>
</body>
</html>
