<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppMenu Component Tests</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #fef7ff;
            color: #1d1b20;
            padding: 24px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 32px;
            color: #6750a4;
        }
        
        .test-controls {
            background: #f3edf7;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
        }
        
        .run-tests-btn {
            background: #6750a4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
        }
        
        .run-tests-btn:hover {
            box-shadow: 0 2px 6px 2px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }
        
        .test-results {
            background: #f7f2fa;
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
            min-height: 200px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.12);
        }
        
        .test-result {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .test-result.pass {
            background: #e8f5e8;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }
        
        .test-result.fail {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }
        
        .test-result.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }
        
        .test-summary {
            background: #f3edf7;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            font-weight: 500;
        }
        
        .test-component {
            margin: 24px 0;
            padding: 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
        }
        
        .test-component h3 {
            margin-bottom: 16px;
            color: #6750a4;
        }
        
        app-menu {
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AppMenu Component Tests</h1>
        
        <div class="test-controls">
            <button id="runTests" class="run-tests-btn">Run All Tests</button>
            <div id="testResults" class="test-results"></div>
        </div>
        
        <div class="test-component">
            <h3>Test Component Instance</h3>
            <app-menu id="testMenu"></app-menu>
        </div>
    </div>

    <script type="module" src="./AppMenu.js"></script>
    <script type="module" src="./AppMenu.test.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const runTestsBtn = document.getElementById('runTests');
            const resultsContainer = document.getElementById('testResults');
            
            runTestsBtn.addEventListener('click', async () => {
                resultsContainer.innerHTML = '<div class="test-result info">Running tests...</div>';
                
                try {
                    // Import and run tests
                    const { runTests } = await import('./AppMenu.test.js');
                    const results = await runTests();
                    
                    // Display results
                    resultsContainer.innerHTML = '';
                    
                    results.forEach(result => {
                        const div = document.createElement('div');
                        div.className = `test-result ${result.status}`;
                        div.textContent = `${result.status.toUpperCase()}: ${result.name} - ${result.message}`;
                        resultsContainer.appendChild(div);
                    });
                    
                    // Add summary
                    const passed = results.filter(r => r.status === 'pass').length;
                    const failed = results.filter(r => r.status === 'fail').length;
                    
                    const summary = document.createElement('div');
                    summary.className = 'test-summary';
                    summary.textContent = `Tests completed: ${passed} passed, ${failed} failed`;
                    resultsContainer.appendChild(summary);
                    
                } catch (error) {
                    resultsContainer.innerHTML = `<div class="test-result fail">ERROR: ${error.message}</div>`;
                }
            });
        });
    </script>
</body>
</html>
